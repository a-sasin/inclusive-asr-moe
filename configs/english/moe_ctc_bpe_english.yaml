# ==============================================================================
# Conformer-MoE-CTC-BPE Large (~121M base + MoE capacity) – Granary English ASR
# ==============================================================================
#
# Model: Conformer-MoE-CTC
#   - Base architecture: Conformer Large
#   - d_model: 512
#   - n_layers: 18
#   - n_heads: 8
#   - conv_kernel_size: 31
#
#   Mixture-of-Experts (MoE):
#   - num_experts: 4
#   - top_k routing: 2
#   - router_noise: 0.01
#   - load_balance_loss_weight: 0.01
#
#   NOTE:
#   Only top_k experts are active per token, increasing model capacity
#   without increasing per-token compute proportionally.
#
# Tokenizer:
#   - BPE (4096 vocab)
#   - Trained on Granary English corpus
#
# Training Data:
#   - Granary English manifests (Lhotse YAML configs)
#   - Dynamic loading via input_cfg
#
# Objective:
#   - CTC loss
#   - Subword modeling (BPE)
#
# ------------------------------------------------------------------------------
# Training Design
# ------------------------------------------------------------------------------
#
#   • Conformer + Mixture-of-Experts feed-forward layers
#       - Increased representational capacity
#       - Sparse expert activation (top_k=2)
#
#   • Lhotse dynamic duration-based bucketing
#       - 30 duration buckets
#       - Custom bucket schedule
#
#   • Optimization
#       - AdamW
#       - NoamAnnealing
#       - Warmup: 10k steps
#       - Peak LR: 2.0 (empirically stable)
#
#   • Regularization
#       - SpecAugment (time_masks=10)
#       - Dropout=0.1
#       - Load balancing loss for MoE
#
#   • Mixed precision
#       - bf16
#
#   • Step-based training
#       - max_steps=100k
#       - Gradient accumulation=4
#
# ------------------------------------------------------------------------------
# Notes
# ------------------------------------------------------------------------------
#
#   This configuration extends the official NeMo Conformer-CTC Large recipe
#   by replacing standard FFN blocks with MoE FFNs.
#
#   Designed to:
#       - Increase model capacity
#       - Improve specialization across acoustic patterns
#       - Maintain computational efficiency via sparse routing
#
# ==============================================================================

name: "Conformer-MoE-CTC-BPE"

model:
  sample_rate: 16000
  log_prediction: true
  ctc_reduction: 'mean_batch'


  train_ds:
    input_cfg: /lp-dev/amelia/inclusive-asr-moe/data/english/train_granary_myst_en.yaml
    skip_missing_manifest_entries: true
    # use_distributed_sampler: true
    num_workers: 8
    shuffle: true
    normalize_text: true
    use_lhotse: true
    force_iterable_dataset: true

    min_duration: 0.5
    max_duration: 30.0

    num_buckets: 30
    use_distributed_sampler: false

    bucket_duration_bins: [0.5,3.42,5.24,6.3,7.12,7.92,8.64,9.31,10.0,10.72,11.52,12.28,13.12,14.0,14.98,16.0,17.12,18.4,19.7,21.16,22.68,24.32,26.0,27.84,29.82,30.0,32.0,35.58,37.38,38.84]
    bucket_batch_size:    [333,333,213,179,155,138,126,116,109,100,94,84,81,76,70,65,58,54,50,47,44,40,37,34,31,29,25,23,22]
    use_bucketing: true



  validation_ds:
    input_cfg: /lp-dev/amelia/inclusive-asr-moe/data/english/val_granary_myst_en.yaml
    skip_missing_manifest_entries: true
    use_lhotse: true

    batch_size: 16
    min_duration: 0.5
    max_duration: 40.1

    shuffle: false
    num_workers: 8
    normalize_text: true

  test_ds:
    manifest_filepath: /data/librispeech/test_clean.json
    sample_rate: 16000
    batch_size: 8
    shuffle: false
    num_workers: 4
    use_lhotse: false
    normalize_text: true 

  tokenizer:
    dir: /home/nvidia/amelia/tokenizers/granary_en_bpe_4096/tokenizer_spe_bpe_v4096
    type: bpe

  preprocessor:
    _target_: nemo.collections.asr.modules.AudioToMelSpectrogramPreprocessor
    sample_rate: ${model.sample_rate}
    normalize: "per_feature"
    window_size: 0.025
    window_stride: 0.01
    window: "hann"
    features: 80
    n_fft: 512
    log: true
    frame_splicing: 1
    dither: 0.00001
    pad_to: 0
    pad_value: 0.0

  spec_augment:
    _target_: nemo.collections.asr.modules.SpectrogramAugmentation
    freq_masks: 2
    time_masks: 10
    freq_width: 27
    time_width: 0.05

  encoder:
    _target_: nemo.collections.asr.modules.ConformerMoEEncoder
    feat_in: ${model.preprocessor.features}
    feat_out: -1
    n_layers: 18
    d_model: 512
    num_experts: 4
    top_k: 2
    router_noise: 0.01
    load_balance_loss_weight: 0.01
    sync_max_audio_length: false

    subsampling: striding
    subsampling_factor: 4
    subsampling_conv_channels: -1
    causal_downsampling: false

    ff_expansion_factor: 4
    self_attention_model: rel_pos
    n_heads: 8
    att_context_size: null
    att_context_style: regular
    xscaling: true
    untie_biases: true
    pos_emb_max_len: 5000

    conv_kernel_size: 31
    conv_norm_type: batch_norm
    conv_context_size: null

    dropout: 0.1
    dropout_pre_encoder: 0.1
    dropout_emb: 0.1
    dropout_att: 0.0

    stochastic_depth_drop_prob: 0.0
    stochastic_depth_mode: linear
    stochastic_depth_start_layer: 1

  decoder:
    _target_: nemo.collections.asr.modules.ConvASRDecoder
    feat_in: null
    num_classes: -1
    vocabulary: []

  interctc:
    loss_weights: []
    apply_at_layers: []

  optim:
    name: adamw
    lr: 2.0
    betas: [0.9, 0.98]
    weight_decay: 1e-3

    sched:
      name: NoamAnnealing
      d_model: ${model.encoder.d_model}
      warmup_steps: 10000
      warmup_ratio: null
      min_lr: 1e-6

trainer:
  devices: -1
  num_nodes: 1
  max_epochs: -1
  max_steps: 100000
  use_distributed_sampler: false


  val_check_interval: 500
  limit_train_batches: 500
  # val_check_interval: 5000
  # limit_train_batches: 5000
  limit_val_batches: 100

  accelerator: auto
  strategy: ddp
  accumulate_grad_batches: 4
  gradient_clip_val: 1.0
  precision: bf16

  log_every_n_steps: 50
  enable_progress_bar: True
  num_sanity_val_steps: 2
  check_val_every_n_epoch: null
  sync_batchnorm: true
  enable_checkpointing: False
  logger: false
  benchmark: false

exp_manager:
  exp_dir: /home/nvidia/amelia/experiments/Conformer
  name: ${name}
  create_tensorboard_logger: true
  create_checkpoint_callback: true
  checkpoint_callback_params:
    monitor: "val_wer"
    mode: "min"
    save_top_k: 1
    save_last: true
    always_save_nemo: True

  resume_if_exists: false
  resume_ignore_no_checkpoint: false

  create_wandb_logger: false
  wandb_logger_kwargs:
    project: null
    name: null
